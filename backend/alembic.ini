# Alembic configuration for the Nik backend.
# The database URL is taken from the app settings at runtime (see alembic/env.py),
# so it works for both the SQLite dev default and PostgreSQL in production.
#
#   cd backend && alembic upgrade head        # apply migrations
#   cd backend && alembic revision -m "msg"   # new migration (autogenerate with --autogenerate)

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
