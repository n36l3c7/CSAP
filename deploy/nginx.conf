# nginx config used inside the `web` container: serve the static SPA and
# reverse-proxy /api to the `api` service (resolved by the compose network DNS).
# One server block answers on both 80 (plain HTTP) and 443 (TLS). The
# certificate is the operator's, mounted into /etc/nginx/certs, or the one
# self-signed at container start by /docker-entrypoint.d/15-gen-selfsigned.sh.
server {
    listen 80;
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/nik.crt;
    ssl_certificate_key /etc/nginx/certs/nik.key;

    # Large JSON payloads (backup restore, incidents with parsed artifacts)
    # blow past nginx's 1m default and get rejected with 413.
    client_max_body_size 200m;

    root  /usr/share/nginx/html;
    index index.html;

    # Fingerprinted assets can be cached forever…
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # …but never cache the HTML entry point, so updates are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API → FastAPI backend container (service name "api", port 8000).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback (harmless: the app has no client-side routing).
    location / {
        try_files $uri /index.html;
    }
}
